<svg xmlns="http://www.w3.org/2007/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <!-- Left Leaf Gradient -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    
    <!-- Right Leaf Gradient -->
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8BC34A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    
    <clipPath id="lightningClip">
      <path d="M 0 0 L 100 0 L 100 120 L 0 120 Z M 60 20 L 40 60 L 55 60 L 35 100 L 70 50 L 50 50 Z" clip-rule="evenodd" />
    </clipPath>
  </defs>

  <!-- Leaf Shape with Lightning Bolt Cutout -->
  <g transform="translate(10, 10)">
    <!-- Right half of leaf (Green) -->
    <path d="M 50 0 C 80 0 100 20 100 50 C 100 80 70 100 50 100 C 50 70 50 30 50 0 Z" fill="url(#rightGrad)" />
    
    <!-- Left half of leaf (Blue/Green) -->
    <path d="M 50 0 C 20 0 0 20 0 50 C 0 80 30 100 50 100 C 50 70 50 30 50 0 Z" fill="url(#leftGrad)" />
    
    <!-- The Lightning bolt Cutout (drawn over top to simulate cutout, or we can just draw right on top in white) -->
    <path d="M 60 15 L 40 55 L 55 55 L 35 95 L 75 45 L 50 45 Z" fill="#ffffff"/>
  </g>

  <!-- Text -->
  <text x="110" y="55" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="38" fill="#111111" letter-spacing="-1">APPARENT</text>
  <text x="125" y="95" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#2E7D32" letter-spacing="2">ENERGY</text>
</svg>
